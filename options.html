<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Salesforce Lightning Admin Enhancer Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1d1d1d;
      max-width: 560px;
      margin: 32px auto;
      padding: 0 16px;
    }
    h2 {
      font-size: 18px;
      margin-bottom: 4px;
    }
    p {
      color: #555;
      margin-bottom: 24px;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .feature input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .feature label {
      cursor: pointer;
    }
    .feature-block {
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .feature-block .feature {
      border-bottom: none;
      padding: 0 0 8px 0;
    }

    /* My Setup Shortcuts manager */
    #nav-fav-list {
      margin-bottom: 8px;
    }
    .nav-fav-empty {
      font-size: 12px;
      color: #999;
      margin: 4px 0 8px;
    }
    .nav-fav-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 13px;
      cursor: default;
    }
    .nav-fav-row--dragging {
      opacity: 0.4;
    }
    .nav-fav-row--over {
      border-top: 2px solid #0176d3;
    }
    .nav-fav-handle {
      color: #bbb;
      cursor: grab;
      font-size: 16px;
      flex-shrink: 0;
      user-select: none;
    }
    .nav-fav-handle:active {
      cursor: grabbing;
    }
    .nav-fav-row-label {
      min-width: 130px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-fav-row-url {
      flex: 1;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-fav-remove {
      padding: 2px 8px;
      font-size: 12px;
      color: #c00;
      background: none;
      border: 1px solid #c00;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .nav-fav-remove:hover {
      background: #fff0f0;
    }
    .nav-fav-add-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .nav-fav-add-row input {
      flex: 1;
      padding: 5px 8px;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .nav-fav-add-row input:focus {
      outline: none;
      border-color: #0176d3;
    }
    .nav-fav-add-row input::placeholder {
      color: #aaa;
    }
    #nav-fav-add-btn {
      padding: 5px 14px;
      background: #0176d3;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    #nav-fav-add-btn:hover {
      background: #0161b0;
    }

    /* Favorites Backup section */
    .section-heading {
      font-weight: 600;
      margin: 0 0 4px;
    }
    .section-desc {
      font-size: 12px;
      color: #555;
      margin: 0 0 10px;
    }
    .feature--select {
      justify-content: space-between;
    }
    .feature--select select {
      font-size: 13px;
      padding: 4px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #save {
      margin-top: 24px;
      padding: 8px 20px;
      background: #0176d3;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    #save:hover {
      background: #0161b0;
    }
    #status {
      margin-top: 10px;
      font-size: 13px;
      color: #2e7d32;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h2>Salesforce Lightning Admin Enhancer</h2>
  <p>Toggle features on or off. Save and reload your Salesforce page to apply changes.</p>

  <div class="feature">
    <input type="checkbox" id="clickableLogo">
    <label for="clickableLogo">Make the Salesforce logo clickable — opens Lightning home in a new tab</label>
  </div>

  <div class="feature">
    <input type="checkbox" id="launchById">
    <label for="launchById">Launch record by ID — adds an input next to the search bar to navigate directly to any record</label>
  </div>

  <div class="feature">
    <input type="checkbox" id="quickFindLayout">
    <label for="quickFindLayout">Quick Find layout — moves the Quick Find filter to the left side of the Object Manager header</label>
  </div>

  <div class="feature">
    <input type="checkbox" id="quickFocus">
    <label for="quickFocus">Quick Focus — auto-focuses the Quick Find input when Setup pages load</label>
  </div>

  <div class="feature-block">
    <div class="feature">
      <input type="checkbox" id="navFavorites">
      <label for="navFavorites">My Setup Shortcuts — adds a shortcuts section to the Setup sidebar</label>
    </div>
    <div id="nav-fav-list"></div>
    <div class="nav-fav-add-row">
      <input type="text" id="nav-fav-label" placeholder="Label">
      <input type="text" id="nav-fav-url" placeholder="/lightning/setup/...">
      <button type="button" id="nav-fav-add-btn">Add</button>
    </div>
  </div>

  <div class="feature">
    <input type="checkbox" id="processBuilder">
    <label for="processBuilder">Process Builder enhancements — drag-to-resize panel, copy text buttons, full API names in modals</label>
  </div>

  <div class="feature">
    <input type="checkbox" id="orgIdHeader">
    <label for="orgIdHeader">Org ID in header — displays the 18-digit Org ID in the Setup header, click to copy</label>
  </div>

  <div class="feature">
    <input type="checkbox" id="setupFavorites">
    <label for="setupFavorites">Setup Favorites — enables the Favorites star and dropdown in Setup, synced with your Salesforce favorites</label>
  </div>

  <div class="feature feature--select">
    <label for="appSwitchBehavior">App Switcher — when switching apps, return to the current record</label>
    <select id="appSwitchBehavior">
      <option value="off">Off</option>
      <option value="auto">Auto-redirect</option>
      <option value="banner">Show prompt</option>
    </select>
  </div>

  <button id="save">Save</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
