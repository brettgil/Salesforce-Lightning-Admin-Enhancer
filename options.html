<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Salesforce Lightning Admin Enhancer Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1d1d1d;
      max-width: 480px;
      margin: 32px auto;
      padding: 0 16px;
    }
    h2 {
      font-size: 18px;
      margin-bottom: 4px;
    }
    p {
      color: #555;
      margin-bottom: 24px;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .feature input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .feature label {
      cursor: pointer;
    }
    #save {
      margin-top: 24px;
      padding: 8px 20px;
      background: #0176d3;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    #save:hover {
      background: #0161b0;
    }
    #status {
      margin-top: 10px;
      font-size: 13px;
      color: #2e7d32;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h2>Salesforce Lightning Admin Enhancer</h2>
  <p>Toggle features on or off. Save and reload your Salesforce page to apply changes.</p>

  <div class="feature">
    <input type="checkbox" id="clickableLogo">
    <label for="clickableLogo">Make the Salesforce logo clickable — opens Lightning home in a new tab</label>
  </div>

  <div class="feature">
    <input type="checkbox" id="launchById">
    <label for="launchById">Launch record by ID — adds an input next to the search bar to navigate directly to any record</label>
  </div>

  <button id="save">Save</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
